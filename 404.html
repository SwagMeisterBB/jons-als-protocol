<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Jon's ALS Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="option-d.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 2rem; text-align: center;
        }
        .error-page h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
        .error-page p { color: var(--text-mid); font-size: 1.125rem; line-height: 1.7; max-width: 28rem; margin: 0 auto 1.5rem; }
        .error-links { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 1rem; }
        .error-links a {
            background: var(--navy); color: white;
            padding: 12px 24px; border-radius: 10px;
            font-weight: 700; min-height: 48px;
            display: inline-flex; align-items: center;
            transition: background 0.2s;
        }
        .error-links a:hover { background: var(--navy-dark); }
        .error-links a.outline {
            background: transparent; color: var(--navy);
            border: 2px solid var(--navy);
        }
        .error-links a.outline:hover { background: var(--navy); color: white; }
    </style>
</head>
<body>
    <div class="error-page">
        <h1>This page doesn't exist.</h1>
        <p>But I'm still here. Whatever you were looking for, these links might help.</p>
        <div class="error-links">
            <a href="index.html">Go Home</a>
            <a href="blog/index.html" class="outline">Read the Blog</a>
            <a href="protocol.html" class="outline">See My Protocol</a>
        </div>
    </div>
</body>
</html>
